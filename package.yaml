name: sense
version: 0.1.0.0
github: "githubuser/sense"
license: BSD-3-Clause
author: "Author name here"
maintainer: "example@example.com"
copyright: "2026 Author name here"

extra-source-files:
  - README.md
  - CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description: Please see the README on GitHub at <https://github.com/githubuser/sense#readme>

dependencies:
  - base >= 4.7 && < 5
  - cassava
  - directory
  - filepath
  - lens
  - lens-aeson
  - optparse-applicative
  - relude
  - req
  - vector
  - yaml

ghc-options:
  # https://github.com/commercialhaskell/stack-templates/blob/360442dbdc3d114df5fe377306978d4f47694370/new-template.hsfiles#L45-L47
  - -threaded
  - -rtsopts
  - -with-rtsopts=-N
  # https://github.com/purescript/purescript/blob/cb3c4965c8468d26c9b14cf0319db6dbd06ee4ff/purescript.cabal#L57-L89
  # This list taken from https://medium.com/mercury-bank/enable-all-the-warnings-a0517bc081c3
  # Enable all warnings with -Weverything, then disable the ones we don’t care about
  - -Weverything

  # missing-exported-signatures turns off the more strict -Wmissing-signatures. See https://ghc.haskell.org/trac/ghc/ticket/14794#ticket
  - -Wno-missing-exported-signatures

  # Requires explicit imports of _every_ function (e.g. ‘$’); too strict
  - -Wno-missing-import-lists

  # When GHC can’t specialize a polymorphic function. No big deal and requires fixing underlying libraries to solve.
  - -Wno-missed-specialisations
  - -Wno-all-missed-specialisations

  # Don’t use Safe Haskell warnings
  - -Wno-unsafe
  - -Wno-safe
  - -Wno-trustworthy-safe
  - -Wno-inferred-safe-imports
  - -Wno-missing-safe-haskell-mode

  # Warning for polymorphic local bindings; nothing wrong with those.
  - -Wno-missing-local-signatures

  # Don’t warn if the monomorphism restriction is used
  - -Wno-monomorphism-restriction

  # Remaining options don't come from the above blog post
  - -Wno-missing-deriving-strategies
  - -Wno-missing-export-lists
  - -Wno-missing-kind-signatures
  - -Wno-partial-fields
  - -Wno-missing-role-annotations

# https://github.com/purescript/purescript/blob/cb3c4965c8468d26c9b14cf0319db6dbd06ee4ff/purescript.cabal#L91-L121
default-extensions:
  - BangPatterns
  - ConstraintKinds
  - DataKinds
  - DefaultSignatures
  - DeriveFunctor
  - DeriveFoldable
  - DeriveTraversable
  - DeriveGeneric
  - DerivingStrategies
  - DerivingVia
  - EmptyDataDecls
  - FlexibleContexts
  - FlexibleInstances
  - GeneralizedNewtypeDeriving
  - ImportQualifiedPost
  - KindSignatures
  - LambdaCase
  - MultiParamTypeClasses
  - NamedFieldPuns
  - NoImplicitPrelude
  - PatternGuards
  - PatternSynonyms
  - RankNTypes
  - RecordWildCards
  - OverloadedRecordDot
  - OverloadedStrings
  - ScopedTypeVariables
  - TupleSections
  - TypeFamilies
  - ViewPatterns

source-dirs: app

# We avoid defining a separate library component to work around a Haskell Language Server (HLS) issue with cross-component dependencies.
# HLS does not reflect changes made in the library component within the executable component until the library is recompiled and HLS is restarted.
executables:
  sense:
    main: Main

tests:
  spec:
    main: Spec
    source-dirs: test
